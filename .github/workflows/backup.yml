name: Database Backup

on:
  schedule:
    - cron: '30 16 * * *'   # 3:00 AM ACDT (UTC+10:30, daylight saving active)
    - cron: '30 17 * * *'   # 3:00 AM ACST (UTC+9:30, standard time)
  workflow_dispatch:        # allows manual "Run workflow" trigger too

jobs:
  backup:
    name: pg_dump production database
    runs-on: ubuntu-latest
    steps:
      - name: Check if it's actually ~3am in Adelaide right now
        id: check_time
        run: |
          LOCAL_HOUR=$(TZ="Australia/Adelaide" date +"%H")
          echo "Current Adelaide local hour: $LOCAL_HOUR"
          if [ "$LOCAL_HOUR" = "03" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "Not the active trigger for the current daylight-saving state — skipping this run."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install PostgreSQL 17 client tools
        if: steps.check_time.outputs.skip != 'true'
        run: |
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-client-17

      - name: Check secret is present (safe - never prints the value)
        if: steps.check_time.outputs.skip != 'true'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "SUPABASE_DB_URL is EMPTY or not found"
            exit 1
          else
            echo "SUPABASE_DB_URL is set, length: ${#SUPABASE_DB_URL} characters"
          fi

      - name: Dump database
        if: steps.check_time.outputs.skip != 'true'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d_%H-%M-%S")
          /usr/lib/postgresql/17/bin/pg_dump "$SUPABASE_DB_URL" --no-owner --no-privileges -F c -f "backup_${TIMESTAMP}.dump"
          echo "BACKUP_FILE=backup_${TIMESTAMP}.dump" >> "$GITHUB_ENV"

      - name: Upload backup as artifact
        if: steps.check_time.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30