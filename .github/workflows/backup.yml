name: Database Backup

on:
  schedule:
    - cron: '0 3 * * *'   # daily at 3:00 AM UTC
  workflow_dispatch:        # allows manual "Run workflow" trigger too

jobs:
  backup:
    name: pg_dump production database
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client tools
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Dump database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d_%H-%M-%S")
          pg_dump "$SUPABASE_DB_URL" --no-owner --no-privileges -F c -f "backup_${TIMESTAMP}.dump"
          echo "BACKUP_FILE=backup_${TIMESTAMP}.dump" >> "$GITHUB_ENV"

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30